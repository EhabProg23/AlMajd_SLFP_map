name: Update Map Data

on:
push:
paths:
- 'data.xlsx'
schedule:
- cron: '*/10 * * * *'

jobs:
build:
runs-on: ubuntu-latest

```
steps:
- uses: actions/checkout@v3

- uses: actions/setup-python@v4
  with:
    python-version: '3.x'

- run: pip install pandas openpyxl

- name: Convert Excel to JSON
  run: |
    python <<EOF
    import pandas as pd, json, re

    df = pd.read_excel("data.xlsx")
    df.columns = [c.strip() for c in df.columns]

    lat = [c for c in df.columns if "lat" in c.lower()][0]
    lon = [c for c in df.columns if "long" in c.lower()][0]
    asset = [c for c in df.columns if "asset" in c.lower()][0]
    current = [c for c in df.columns if "current" in c.lower()][0]

    def clean(v):
        v = re.sub(r'[^\d\.\-]', '', str(v))
        try: return float(v)
        except: return 0

    data=[]
    for _,r in df.iterrows():
        popup = f"<b>Asset:</b> {r[asset]}<br><b>Current:</b> {r[current]}%<br><hr>"
        for c in df.columns:
            if pd.notna(r[c]):
                popup += f"<b>{c}:</b> {r[c]}<br>"

        data.append({
            "lat": clean(r[lat]),
            "lon": clean(r[lon]),
            "asset": str(r[asset]),
            "current": clean(r[current]),
            "popup": popup
        })

    with open("data.json","w",encoding="utf-8") as f:
        json.dump(data,f,ensure_ascii=False)
    EOF

- name: Commit JSON
  run: |
    git config user.name "github-actions"
    git config user.email "actions@github.com"
    git add data.json
    git commit -m "Auto update data" || echo "No changes"
    git push
```
