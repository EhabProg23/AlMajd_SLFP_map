* name: Convert Excel to JSON
  run: |
  python <<EOF
  import pandas as pd, json

  df = pd.read_excel("data.xlsx")
  df.columns = [c.strip() for c in df.columns]

  lat_col = "Latitude"
  lon_col = "Longtitude"
  asset_col = "ASSET_TAG"
  current_col = "Running Currunt %"

  def clean(v):
  try:
  return float(str(v).replace('%','').strip())
  except:
  return 0

  data = []

  for _, r in df.iterrows():

  ```
    if pd.isna(r[lat_col]) or pd.isna(r[lon_col]):
        continue

    popup = f"<b>Asset:</b> {r[asset_col]}<br><b>Current:</b> {r[current_col]}%<br><hr>"

    for c in df.columns:
        if pd.notna(r[c]):
            popup += f"<b>{c}:</b> {r[c]}<br>"

    data.append({
        "lat": clean(r[lat_col]),
        "lon": clean(r[lon_col]),
        "asset": str(r[asset_col]),
        "current": clean(r[current_col]),
        "popup": popup
    })
  ```

  with open("data.json","w",encoding="utf-8") as f:
  json.dump(data,f,ensure_ascii=False)
  EOF
