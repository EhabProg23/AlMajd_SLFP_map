<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLFP Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body,#map {height:100%;margin:0}
.panel {
  position:absolute;top:10px;left:10px;z-index:1000;
  background:white;padding:10px;border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
  width:260px;font-size:12px;
}
input,select {width:100%;margin-top:6px;margin-bottom:6px}
.legend {margin-top:8px}
</style>

</head>

<body>
<div id="map"></div>

<div class="panel">
  <b>Search Asset</b>
  <input id="search" placeholder="Enter Asset Tag">

<b>Filter Load</b> <select id="filter"> <option value="all">All</option> <option value="high">>80%</option> <option value="mid">70–80%</option> <option value="low"><70%</option> </select>

  <div class="legend">
    <b>Legend</b><br>
    🔴 High (>80%)<br>
    🟢 Mid (70–80)<br>
    🟢 Low (<70)
  </div>
</div>

<script>
var map = L.map('map').setView([25.3,51.5],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var markers = [];

function getColor(c){
  if(c>80) return "red";
  if(c>=70) return "darkgreen";
  return "green";
}

function createIcon(color){
  var canvas=document.createElement('canvas');
  canvas.width=40;canvas.height=40;
  var ctx=canvas.getContext('2d');

  // cabinet
  ctx.fillStyle='#ccc';
  ctx.fillRect(8,8,24,24);
  ctx.strokeStyle='black';
  ctx.lineWidth=2;
  ctx.strokeRect(8,8,24,24);

  // lightning
  ctx.strokeStyle=color;
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(20,10);
  ctx.lineTo(15,25);
  ctx.lineTo(25,25);
  ctx.lineTo(18,35);
  ctx.stroke();

  return L.icon({iconUrl:canvas.toDataURL(),iconSize:[30,30]});
}

function render(data){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  let search=document.getElementById('search').value.toLowerCase();
  let filter=document.getElementById('filter').value;

  data.forEach(p=>{
    let color=getColor(p.current);

    if(search && !p.asset.toLowerCase().includes(search)) return;
    if(filter==="high" && p.current<=80) return;
    if(filter==="mid" && (p.current<70 || p.current>80)) return;
    if(filter==="low" && p.current>=70) return;

    var marker=L.marker([p.lat,p.lon],{icon:createIcon(color)}).addTo(map);
    marker.bindPopup("<div style='max-height:200px;overflow:auto'>"+p.popup+"</div>");
    markers.push(marker);
  });
}

// 🔥 هنا السر: قراءة data.json
function loadData(){
  fetch('data.json?ts=' + Date.now()) // cache busting
  .then(r=>r.json())
  .then(d=>render(d));
}

document.getElementById('search').addEventListener('input', loadData);
document.getElementById('filter').addEventListener('change', loadData);

loadData();
setInterval(loadData, 60000); // تحديث كل دقيقة
</script>

</body>
</html>
