<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SLFP Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; }
    #map { height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      z-index: 1000;
      border-radius: 8px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input, select {
      width: 100%;
      margin-bottom: 10px;
      padding: 5px;
    }
  </style>
</head>

<body>

<div class="panel">
  <input type="text" id="search" placeholder="Search Asset">
  <select id="filter">
    <option value="all">All</option>
    <option value="high">High (>80%)</option>
    <option value="mid">Mid (70-80%)</option>
    <option value="low">Low (<70%)</option>
  </select>
</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([25.2854, 51.5310], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

var markers = [];

// تحديد اللون حسب القيمة
function getColor(val) {
  if (val > 80) return "red";
  if (val >= 70) return "orange";
  return "green";
}

// تحميل البيانات
fetch("data.json?ts=" + new Date().getTime())
.then(res => res.json())
.then(data => {

  data.forEach(item => {

    var lat = item.Latitude || item.lat;
    var lon = item.Longitude || item.lon;
    var current = parseFloat(item["Running Current %"] || item.current || 0);

    if (!lat || !lon) return;

    var marker = L.circleMarker([lat, lon], {
      radius: 8,
      color: getColor(current)
    }).addTo(map);

    // Popup بكل البيانات
    var html = "";
    for (var key in item) {
      html += "<b>" + key + ":</b> " + item[key] + "<br>";
    }

    marker.bindPopup(html);

    marker.myData = item;
    markers.push(marker);
  });

});

// Search
document.getElementById("search").addEventListener("input", function(e) {
  var val = e.target.value.toLowerCase();

  markers.forEach(m => {
    var text = JSON.stringify(m.myData).toLowerCase();
    if (text.includes(val)) {
      m.addTo(map);
    } else {
      map.removeLayer(m);
    }
  });
});

// Filter
document.getElementById("filter").addEventListener("change", function(e) {
  var val = e.target.value;

  markers.forEach(m => {
    var current = parseFloat(m.myData["Running Current %"] || 0);

    if (
      val === "all" ||
      (val === "high" && current > 80) ||
      (val === "mid" && current >= 70 && current <= 80) ||
      (val === "low" && current < 70)
    ) {
      m.addTo(map);
    } else {
      map.removeLayer(m);
    }
  });
});
</script>

</body>
</html>
